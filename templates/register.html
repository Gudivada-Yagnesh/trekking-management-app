<!DOCTYPE html>
<html>

<head>
    <title>Register</title>
</head>

<body>

    <h1>Register</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <label>Name:</label>
        <input type="text" name="name" required>

        <br><br>

        <label>Email:</label>
        <input type="email" name="email" required>

        <br><br>

        <label>Password:</label>
        <input type="password" name="password" required>

        <br><br>

        <label>Register As:</label>

        <select name="role" required>

            <option value="TREKKER">
                Trekker
            </option>

            <option value="STAFF">
                Trek Staff
            </option>

        </select>

        <br><br>

        <button type="submit">
            Register
        </button>

    </form>

</body>

</html>
