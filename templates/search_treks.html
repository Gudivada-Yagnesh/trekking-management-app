<form action="/trekker/search">
    <input
        type="text"
        name="location"
        placeholder="Location"
    >
    <select name="difficulty">
        <option value="">All</option>
        <option value="Easy">Easy</option>
        <option value="Moderate">Moderate</option>
        <option value="Hard">Hard</option>
    </select>
    <button type="submit">
        Search
    </button>
</form>
