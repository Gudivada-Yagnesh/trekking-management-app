<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
</head>

<body>

    <h1>Login</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        Email:
        <input
            type="email"
            name="email"
            required
        >

        <br><br>

        Password:
        <input
            type="password"
            name="password"
            required
        >

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

</body>

</html>
